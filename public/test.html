<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Circuit Sim WASM Test</title></head>
<body>
<pre id="output">Loading...</pre>
<script src="circuit_sim.js"></script>
<script>
Module.onRuntimeInitialized = () => {
    const runDC = Module.cwrap('runDC', 'string', ['string']);
    const runAC = Module.cwrap('runAC', 'string', ['string', 'number']);
    const runTransient = Module.cwrap('runTransient', 'string', ['string', 'number', 'number']);

    const results = [];

    const dcNetlist = `R1 1 0 1000\nV1 1 0 5\n.DC\n`;
    results.push('--- DC ---');
    results.push(runDC(dcNetlist));

    const acNetlist = `R1 1 2 1000\nC1 2 0 1e-6\nV1 1 0 1\n.AC 1000\n`;
    results.push('--- AC ---');
    results.push(runAC(acNetlist, 1000));

    const tranNetlist = `R1 1 2 1000\nC1 2 0 1e-6 IC=0\nV1 1 0 5\n.TRAN 1e-5 5e-3\n`;
    results.push('--- Transient ---');
    results.push(runTransient(tranNetlist, 1e-5, 5e-3));

    document.getElementById('output').textContent = results.join('\n');
};
</script>
</body>
</html>
